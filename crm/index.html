<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Better Tap — Admin Sign In</title>
  <link rel="stylesheet" href="assets/css/crm.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <img src="../assets/img/bettertap-logo.png" alt="Better Tap" class="logo">
      <h1 id="title">Admin sign in</h1>
      <p class="sub" id="subtitle">Sign in to your Better Tap workspace</p>

      <div class="msg" id="msg"></div>

      <form id="authForm" autocomplete="on">
        <div class="field" id="nameField" style="display:none">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" autocomplete="name" placeholder="e.g. Doni Baratz">
        </div>
        <div class="field">
          <label for="email">Work email</label>
          <input type="email" id="email" autocomplete="email" required placeholder="you@drinkbettertap.com">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required minlength="6" placeholder="••••••••">
        </div>
        <button type="submit" class="btn" id="submitBtn">Sign in</button>
      </form>

      <div class="auth-foot">
        <span id="toggleText">First time here?</span>
        <a id="toggleLink">Create your account</a>
      </div>
    </div>
  </div>

  <script src="assets/js/demo-backend.js"></script>
  <script src="assets/js/config.js"></script>
  <script>
  (function(){
    'use strict';
    var msg = document.getElementById('msg');
    function show(type, text){ msg.className = 'msg show ' + type; msg.textContent = text; }
    function hide(){ msg.className = 'msg'; }

    // --- config guard ---
    var cfg = window.BT_CONFIG || {};
    if (!cfg.SUPABASE_URL || cfg.SUPABASE_URL.indexOf('PASTE') === 0) {
      show('info', 'CRM not configured yet — add your Supabase URL + anon key in assets/js/config.js.');
      document.getElementById('authForm').style.opacity = '.5';
      document.getElementById('submitBtn').disabled = true;
      return;
    }

    var sb = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    var mode = 'signin'; // or 'signup'

    // already logged in? go to app
    sb.auth.getSession().then(function(res){
      if (res.data && res.data.session) window.location.href = 'app.html';
    });

    var titleEl = document.getElementById('title');
    var subEl = document.getElementById('subtitle');
    var submitBtn = document.getElementById('submitBtn');
    var nameField = document.getElementById('nameField');
    var toggleText = document.getElementById('toggleText');
    var toggleLink = document.getElementById('toggleLink');
    var pwd = document.getElementById('password');

    function setMode(m){
      mode = m; hide();
      if (m === 'signup'){
        titleEl.textContent = 'Create your account';
        subEl.textContent = 'Use your Better Tap work email';
        submitBtn.textContent = 'Create account';
        nameField.style.display = '';
        pwd.setAttribute('autocomplete','new-password');
        toggleText.textContent = 'Already have an account?';
        toggleLink.textContent = 'Sign in';
      } else {
        titleEl.textContent = 'Admin sign in';
        subEl.textContent = 'Sign in to your Better Tap workspace';
        submitBtn.textContent = 'Sign in';
        nameField.style.display = 'none';
        pwd.setAttribute('autocomplete','current-password');
        toggleText.textContent = 'First time here?';
        toggleLink.textContent = 'Create your account';
      }
    }
    toggleLink.addEventListener('click', function(){ setMode(mode === 'signin' ? 'signup' : 'signin'); });

    document.getElementById('authForm').addEventListener('submit', function(e){
      e.preventDefault();
      hide();
      var email = document.getElementById('email').value.trim().toLowerCase();
      var password = pwd.value;
      var fullName = document.getElementById('fullName').value.trim();
      submitBtn.disabled = true;
      submitBtn.textContent = mode === 'signup' ? 'Creating…' : 'Signing in…';

      var p = (mode === 'signup')
        ? sb.auth.signUp({ email: email, password: password, options: { data: { full_name: fullName } } })
        : sb.auth.signInWithPassword({ email: email, password: password });

      p.then(function(res){
        if (res.error){ show('err', res.error.message); resetBtn(); return; }
        if (mode === 'signup' && res.data && res.data.user && !res.data.session){
          // email confirmation is ON
          show('ok', 'Account created. Check your email to confirm, then sign in.');
          setMode('signin'); resetBtn(); return;
        }
        window.location.href = 'app.html';
      }).catch(function(err){ show('err', err.message || 'Something went wrong.'); resetBtn(); });
    });

    function resetBtn(){
      submitBtn.disabled = false;
      submitBtn.textContent = mode === 'signup' ? 'Create account' : 'Sign in';
    }
  })();
  </script>
</body>
</html>
